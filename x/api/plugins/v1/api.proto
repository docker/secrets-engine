edition = "2023";

package plugins.v1;

option go_package = "github.com/docker/secrets-engine/x/api/plugins/v1;pluginsv1";



service PluginManagementService {
  // ListPlugins returns all plugins registered with the engine.
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);
  // EnablePlugin enables a plugin by name.
  rpc EnablePlugin(EnablePluginRequest) returns (EnablePluginResponse);
  // DisablePlugin disables a plugin by name.
  rpc DisablePlugin(DisablePluginRequest) returns (DisablePluginResponse);
}

enum RunStatus {
  RUN_STATUS_UNSPECIFIED      = 0;
  RUN_STATUS_RUNNING          = 1;
  RUN_STATUS_STOPPED          = 2;
  RUN_STATUS_CRASHED          = 3;
  RUN_STATUS_RETRIES_EXCEEDED = 4;
}

message Plugin {
  // Name
  string name = 1;
  // Version
  string version = 2;
  // Enabled vs disabled
  bool disabled = 3;
  // External vs builtin
  bool external = 4;
  // Configurable
  bool configurable = 5;
  // Run status
  RunStatus run_status = 6;
  // Type-specific fields
  oneof metadata {
    SecretsProvider secrets_provider = 7;
  }
}

message SecretsProvider {
  // Pattern
  string pattern = 1;
}

message ListPluginsRequest {}

message ListPluginsResponse {
  repeated Plugin plugins = 1;
}

message EnablePluginRequest {
  string name = 1;
}

message EnablePluginResponse {}

message DisablePluginRequest {
  string name = 1;
}

message DisablePluginResponse {}
