name: Keychain
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'store/**'
jobs:
  linux-keychain:
    permissions:
      id-token: write
      contents: read
    name: LinuxKeychainTests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        subtest:
          - fedora-43-gnome-keyring
          - ubuntu-24-gnome-keyring
          # disabled kdewallet tests since it prompts for a password in a
          # headless environment... need to still fix this
          # - fedora-43-kdewallet
          # - ubuntu-24-kdewallet
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Hub login
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: dockerpublicbot
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver: cloud
          endpoint: "docker/secrets-engine"
          install: true
      - name: Test
        run: DOCKER_TARGET=${{ matrix.subtest }} make keychain-linux-ci-unit-tests
  tests-windows:
    permissions:
      id-token: write
      contents: read
    name: WindowsKeychainTests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.work
      - name: Test keychain
        run: make keychain-unit-tests
  tests-macos:
    permissions:
      id-token: write
      contents: read
    name: MacOSKeychainTests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macOS-26
          - macOS-15
          - macOS-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.work
      - name: Test keychain
        run: make keychain-unit-tests
